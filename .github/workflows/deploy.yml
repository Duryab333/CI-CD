name: Deploy Application

on:
  workflow_run:
    workflows: [Build and Push]
    types: completed

jobs:
  deploy:
    if: ${{github.event.workflow_run.conclusion == 'success'}}
    runs-on: ubuntu-latest
    steps:
      - name: setup docker
        uses:  docker/setup-docker-action@v5
      - name: pull image from DockerHub
        run: docker pull ${{vars.DOCKERHUB_USERNAME}}/python-app:${{ github.sha}}
      - name: stop and remove  container
        run: |
          docker stop pyhton-app || true
          docker rm python-app || true
      - name: deploy the applicaion
        run: docker run -d --name python-app --restart unless-stopped -p 8080:8080 ${{vars.DOCKERHUB_USERNAME}}/python-app:${{ github.sha}}
          
    
