name: Build and push

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v7

      - name: setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          
      - name: installing depenencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r  requirements.txt
      
      - name: runing test
        run: pyhton pytest
        
  build-push:
    runs-on: ubuntu-latest
    needs: test
    steps:  
      - name: Docker login
        uses: actions/login-action@v4
        with:
          username: ${{vars.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Docker image build
        uses: docker/build-push-action@v7
        with:
          content: .
          push: true
          tag: ${{vars.DOCKERHUB_USERNAME}}/python-app:${{ github.sha }}
   
        
    
      
        
