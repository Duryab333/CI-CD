---
name: test-build-push
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the env value where this workflow runs
        default: 'dev'
        type: choice
        required: true
        options:
          - dev
          - prod
          - stag
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: setup pyhton
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: install depencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: testing
        run: python -m pytest
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: install flake
        run: |
          python -m pip install flake8
          flake8 .
  build-push:
    if: inputs.environment == 'dev'
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
    #if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: >
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest . 

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ github.sha }} . # Add version tags to the Docker image
      - name: Push image to Docker Hub
        run: >+
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest 

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ github.sha }}
            
